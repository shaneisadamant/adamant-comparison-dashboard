<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adamant | Data Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --grey: #696969;
      --sunset: #696969;
      --sunrise: #696969;
      --border: rgba(105, 105, 105, 0.3);
      --headline-font: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 0 40px;
      height: 72px;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo img {
      height: 28px;
      width: auto;
      flex-shrink: 0;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 64px 40px 120px;
    }

    .page-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 14px;
    }

    .page-title {
      font-family: var(--headline-font);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 56px;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    thead tr th {
      padding: 0 0 28px;
      text-align: left;
      vertical-align: bottom;
    }

    th.metric-col { width: 24%; padding-right: 24px; }
    th.scenario-col { width: 38%; padding-right: 24px; }

    .col-header-sublabel {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 6px;
      display: block;
    }

    .col-header-name {
      font-family: var(--headline-font);
      font-size: clamp(20px, 2.8vw, 30px);
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.05;
      display: block;
    }

    .col-header-divider {
      height: 2px;
      margin-top: 14px;
      border: none;
    }

    tbody tr {
      border-top: 3px solid rgba(255,255,255,0.25);
      transition: background 0.15s;
    }

    tbody tr:hover { background: rgba(255,255,255,0.025); }

    tbody td { padding: 24px 0; vertical-align: top; }

    td.metric-label {
      font-family: 'Inter', sans-serif;
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-right: 24px;
      padding-top: 26px;
      line-height: 1.5;
    }

    td.metric-value {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.65;
      padding-right: 24px;
      color: var(--white);
    }

    .source-wrapper {
      position: relative;
      display: inline-block;
      margin-top: 10px;
    }

    .source-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid var(--grey);
      color: var(--grey);
      font-size: 9px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-style: normal;
    }

    .source-icon:hover { border-color: var(--white); color: var(--white); }

    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: #111;
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--grey);
      width: 260px;
      z-index: 10;
    }

    .tooltip a {
      color: var(--white);
      text-decoration: underline;
      display: block;
      margin-top: 6px;
      font-size: 10px;
      word-break: break-all;
    }

    .source-wrapper:hover .tooltip { display: block; }

    .dashboard-footer {
      margin-top: 80px;
      padding-top: 32px;
      border-top: 3px solid rgba(255,255,255,0.25);
      color: var(--grey);
      font-size: 11px;
      line-height: 1.7;
    }

    .dashboard-footer a { color: var(--grey); text-decoration: underline; }

    .loading {
      color: var(--grey);
      font-size: 13px;
      padding: 80px 0;
      text-align: center;
    }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .page { padding: 40px 20px 80px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="https://weareadamant.ca">
      <img src="./Adamant_FullLogo_White.png" alt="Adamant" />
    </a>
  </nav>

  <div class="page">
    <p class="page-label">Economic Analysis</p>
    <h1 class="page-title">The Choice in Numbers</h1>

    <div class="table-wrapper">
      <div class="loading" id="loading">Loading data...</div>
      <table id="dashboard-table" style="display:none">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div class="dashboard-footer">
      Sources: IISD, Clean Energy Canada, IEA, Canadian Climate Institute, Natural Resources Canada.<br/>
      Data reflects best available research as of 2026. <a href="https://weareadamant.ca" target="_blank">weareadamant.ca</a>
    </div>
  </div>

  <script>
    async function loadDashboard() {
      const res = await fetch('./scenarios.json');
      const data = await res.json();
      renderDashboard(data);
    }

    function renderDashboard(data) {
      const { scenarios, metrics } = data;

      const thead = document.getElementById('table-head');
      const headerRow = document.createElement('tr');

      const metricTh = document.createElement('th');
      metricTh.className = 'metric-col';
      headerRow.appendChild(metricTh);

      scenarios.forEach(scenario => {
        const th = document.createElement('th');
        th.className = 'scenario-col';

        const sublabel = document.createElement('span');
        sublabel.className = 'col-header-sublabel';
        sublabel.style.color = scenario.accent;
        sublabel.textContent = scenario.sublabel;

        const name = document.createElement('span');
        name.className = 'col-header-name';
        name.textContent = scenario.label;

        const divider = document.createElement('hr');
        divider.className = 'col-header-divider';
        divider.style.background = scenario.accent;

        th.appendChild(sublabel);
        th.appendChild(name);
        th.appendChild(divider);
        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);

      const tbody = document.getElementById('table-body');

      metrics.forEach(metric => {
        const row = document.createElement('tr');

        const labelTd = document.createElement('td');
        labelTd.className = 'metric-label';
        labelTd.textContent = metric.label;
        row.appendChild(labelTd);

        scenarios.forEach(scenario => {
          const td = document.createElement('td');
          td.className = 'metric-value';

          const valueText = document.createElement('div');
          valueText.textContent = metric.values[scenario.id] || '';
          td.appendChild(valueText);

          if (scenario === scenarios[0] && metric.source) {
            const wrapper = document.createElement('div');
            wrapper.className = 'source-wrapper';

            const icon = document.createElement('span');
            icon.className = 'source-icon';
            icon.textContent = 'i';

            const tooltip = document.createElement('div');
            tooltip.className = 'tooltip';
            tooltip.textContent = metric.source;

            if (metric.sourceUrl) {
              const link = document.createElement('a');
              link.href = metric.sourceUrl;
              link.target = '_blank';
              link.rel = 'noopener';
              link.textContent = metric.sourceUrl;
              tooltip.appendChild(link);
            }

            wrapper.appendChild(icon);
            wrapper.appendChild(tooltip);
            td.appendChild(wrapper);
          }

          row.appendChild(td);
        });

        tbody.appendChild(row);
      });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard-table').style.display = 'table';
    }

    loadDashboard().catch(err => {
      document.getElementById('loading').textContent = 'Failed to load data.';
      console.error(err);
    });
  </script>

</body>
</html>
